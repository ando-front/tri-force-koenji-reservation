name: Staging Deploy

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            functions/package-lock.json
            frontend/package-lock.json

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Build Functions
        working-directory: functions
        run: npm run build

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FUNCTIONS_BASE_URL:           ${{ secrets.VITE_FUNCTIONS_BASE_URL }}
          VITE_USE_EMULATORS:                'false'
        run: npm run build

      - name: Deploy Hosting to staging channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: staging

      # 注意: 単に `env:` で渡すだけでは Cloud Functions v2 のランタイムには届かない。
      #       firebase CLI が自動で読み込む `.env.<project>` ファイルに書き出すことで、
      #       デプロイ時に runtime env vars としてバンドルされるようにする。
      #       (ファイル自体はソースバンドルから除外するよう firebase.json で設定済み)
      - name: Write Functions runtime env file
        working-directory: functions
        env:
          FIREBASE_PROJECT_ID:  ${{ secrets.FIREBASE_PROJECT_ID }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          ADMIN_MAIL_BCC:       ${{ secrets.ADMIN_MAIL_BCC }}
          MAIL_FROM:            ${{ secrets.MAIL_FROM }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          FRONTEND_BASE_URL:    ${{ secrets.FRONTEND_BASE_URL }}
        run: |
          set -euo pipefail
          # 必須secretsが欠落していると staging のメール送信が無音失敗するため fail-fast する。
          # FRONTEND_BASE_URL は staging だと未設定でもメールリンクが相対パスになる
          # だけで送信自体は成功するため、警告のみに留める（本番側は deploy.yml で必須）。
          : "${FIREBASE_PROJECT_ID:?GitHub Secret FIREBASE_PROJECT_ID is missing}"
          : "${RESEND_API_KEY:?GitHub Secret RESEND_API_KEY is missing}"
          : "${MAIL_FROM:?GitHub Secret MAIL_FROM is missing}"
          if [ -z "${FRONTEND_BASE_URL:-}" ]; then
            echo "::warning::FRONTEND_BASE_URL is not set; cancellation/confirmation email links will fall back to relative paths"
          fi

          umask 077
          {
            printf 'RESEND_API_KEY=%s\n'       "$RESEND_API_KEY"
            printf 'ADMIN_MAIL_BCC=%s\n'       "$ADMIN_MAIL_BCC"
            printf 'MAIL_FROM=%s\n'            "$MAIL_FROM"
            printf 'CORS_ALLOWED_ORIGINS=%s\n' "$CORS_ALLOWED_ORIGINS"
            printf 'FRONTEND_BASE_URL=%s\n'    "$FRONTEND_BASE_URL"
          } > ".env.${FIREBASE_PROJECT_ID}"

      - name: Deploy Functions to staging project
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --token "${{ secrets.FIREBASE_CI_TOKEN }}" \
            --force
