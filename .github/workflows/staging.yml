name: Staging Deploy

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            functions/package-lock.json
            frontend/package-lock.json

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Build Functions
        working-directory: functions
        run: npm run build

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FUNCTIONS_BASE_URL:           ${{ secrets.VITE_FUNCTIONS_BASE_URL }}
          VITE_USE_EMULATORS:                'false'
        run: npm run build

      - name: Deploy Hosting to staging channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: staging

      # 注意: 単に `env:` で渡すだけでは Cloud Functions v2 のランタイムには届かない。
      #       firebase CLI が自動で読み込む `.env.<project>` ファイルに書き出すことで、
      #       デプロイ時に runtime env vars としてバンドルされるようにする。
      #       (ファイル自体はソースバンドルから除外するよう firebase.json で設定済み)
      - name: Write Functions runtime env file
        working-directory: functions
        env:
          FIREBASE_PROJECT_ID:  ${{ secrets.FIREBASE_PROJECT_ID }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          ADMIN_MAIL_BCC:       ${{ secrets.ADMIN_MAIL_BCC }}
          MAIL_FROM:            ${{ secrets.MAIL_FROM }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          FRONTEND_BASE_URL:    ${{ secrets.FRONTEND_BASE_URL }}
        run: |
          set -uo pipefail
          # 必須 secret 欠落も全て warn のみとし、なぜ deploy が失敗するか
          # 切り分けやすくする（本番側は deploy.yml で fail-fast）。
          warn() { echo "::warning::$1"; }
          [ -n "${FIREBASE_PROJECT_ID:-}" ] || warn "FIREBASE_PROJECT_ID is not set in staging; deploy will fail"
          [ -n "${RESEND_API_KEY:-}" ]      || warn "RESEND_API_KEY is not set in staging; reservation emails will be skipped silently"
          [ -n "${MAIL_FROM:-}" ]           || warn "MAIL_FROM is not set in staging; Resend will reject if RESEND_API_KEY is set"
          [ -n "${FRONTEND_BASE_URL:-}" ]   || warn "FRONTEND_BASE_URL is not set in staging; email cancel links will fall back to relative paths"

          # FIREBASE_PROJECT_ID が空だと .env. というファイル名になり混乱するので
          # その場合は .env だけを書き出す（firebase は default project を使う）。
          ENV_FILE=".env"
          if [ -n "${FIREBASE_PROJECT_ID:-}" ]; then
            ENV_FILE=".env.${FIREBASE_PROJECT_ID}"
          fi
          echo "Writing runtime env to functions/${ENV_FILE}"

          # 切り分け用: 各 secret の有無を出力（値は伏字）
          echo "::group::Secret presence check"
          for v in FIREBASE_PROJECT_ID RESEND_API_KEY MAIL_FROM ADMIN_MAIL_BCC CORS_ALLOWED_ORIGINS FRONTEND_BASE_URL; do
            value="${!v:-}"
            if [ -n "$value" ]; then
              echo "  $v: <set, length=${#value}>"
            else
              echo "  $v: <empty>"
            fi
          done
          echo "::endgroup::"

          umask 077
          {
            printf 'RESEND_API_KEY=%s\n'       "${RESEND_API_KEY:-}"
            printf 'ADMIN_MAIL_BCC=%s\n'       "${ADMIN_MAIL_BCC:-}"
            printf 'MAIL_FROM=%s\n'            "${MAIL_FROM:-}"
            printf 'CORS_ALLOWED_ORIGINS=%s\n' "${CORS_ALLOWED_ORIGINS:-}"
            printf 'FRONTEND_BASE_URL=%s\n'    "${FRONTEND_BASE_URL:-}"
          } > "$ENV_FILE"

      - name: Deploy Functions to staging project
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --token "${{ secrets.FIREBASE_CI_TOKEN }}" \
            --force
