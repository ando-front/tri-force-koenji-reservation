name: Staging Deploy

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            functions/package-lock.json
            frontend/package-lock.json

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Build Functions
        working-directory: functions
        run: npm run build

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FUNCTIONS_BASE_URL:           ${{ secrets.VITE_FUNCTIONS_BASE_URL }}
          VITE_USE_EMULATORS:                'false'
        run: npm run build

      - name: Deploy Hosting to staging channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: staging

      - name: Deploy Functions to staging project
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --token "${{ secrets.FIREBASE_CI_TOKEN }}" \
            --force
        env:
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          ADMIN_MAIL_BCC:       ${{ secrets.ADMIN_MAIL_BCC }}
          MAIL_FROM:            ${{ secrets.MAIL_FROM }}
          # Functions 側は CORS_ALLOWED_ORIGINS を読むので env 名を合わせる
          CORS_ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          FRONTEND_BASE_URL:    ${{ secrets.FRONTEND_BASE_URL }}
