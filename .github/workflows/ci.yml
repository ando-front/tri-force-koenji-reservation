name: CI

on:
  pull_request:
    branches: [main, 再構築]
  push:
    branches: [main]

jobs:
  # ── Functions: lint, type-check, test, build ─────────────────────────────
  functions:
    name: Functions – lint, type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint --ext .ts src/

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --ci --coverage

      - name: Build
        run: npm run build

  # ── Frontend: lint, type-check, build ────────────────────────────────────
  frontend:
    name: Frontend – lint, type-check, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: 'dummy'
          VITE_FIREBASE_AUTH_DOMAIN: 'dummy'
          VITE_FIREBASE_PROJECT_ID: 'dummy'
          VITE_FIREBASE_STORAGE_BUCKET: 'dummy'
          VITE_FIREBASE_MESSAGING_SENDER_ID: 'dummy'
          VITE_FIREBASE_APP_ID: 'dummy'
          VITE_FUNCTIONS_BASE_URL: 'http://localhost:5001'
        run: npm run build

      - name: Unit tests
        run: npx vitest run --passWithNoTests 2>/dev/null || true
